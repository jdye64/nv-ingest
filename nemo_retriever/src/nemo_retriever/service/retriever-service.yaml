# Retriever Service Mode — default configuration
#
# Discovery precedence:
#   1. Explicit --config /path/to/retriever-service.yaml
#   2. ./retriever-service.yaml  (current working directory)
#   3. Bundled default shipped with the nemo-retriever package
#
# Every value below can also be overridden from the CLI:
#   retriever service start --port 9000 --log-level DEBUG

server:
  host: "0.0.0.0"
  port: 7670

logging:
  level: "INFO"
  file: "retriever-service.log"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

database:
  # Path to the SQLite database file.  Relative paths are resolved from cwd.
  path: "retriever-service.db"

processing:
  # Number of worker processes.  Each process builds its own isolated
  # operator chain and runs pipelines independently — no thread-safety
  # concerns.  With remote NIM endpoints the chains are lightweight HTTP
  # clients so 16 workers is a sensible default.  For local GPU models,
  # lower this to match available VRAM (e.g. 1-2).
  num_workers: 64
  # Pages are batched before being sent to the GraphPipeline.  Larger
  # batches improve GPU/NIM throughput but increase per-page latency.
  batch_size: 16
  # Maximum seconds to wait for a full batch before dispatching a
  # partial one.  Keeps latency low for small jobs.
  batch_timeout_s: 2.0

# Remote NIM microservice endpoints.  When set, the pipeline calls these
# HTTP endpoints instead of loading GPU models locally.  All four must
# be provided for a fully remote configuration.
#
# Multiple endpoints per model:  Provide a comma-separated list of URLs
# to spread load across replicas.  On startup, endpoints are distributed
# round-robin across worker processes so each worker targets exactly one
# URL, balancing traffic evenly.
#   Example: "http://host1:8000/v1/infer,http://host2:8000/v1/infer"
nim_endpoints:
  page_elements_invoke_url: http://localhost:8000/v1/infer,http://localhost:8100/v1/infer
  graphic_elements_invoke_url: http://localhost:8003/v1/infer,http://localhost:8103/v1/infer
  table_structure_invoke_url: http://localhost:8006/v1/infer,http://localhost:8106/v1/infer
  ocr_invoke_url: http://localhost:8009/v1/infer,http://localhost:8109/v1/infer
  embed_invoke_url: http://localhost:8012/v1/embeddings,http://localhost:8112/v1/embeddings
  # NVIDIA API key (or NIM auth token).  Also reads $NVIDIA_API_KEY env var.
  api_key: null

resources:
  # Hard memory cap in MiB.  null = no limit.
  max_memory_mb: null
  # CPU core affinity.  null = all cores.
  max_cpu_cores: null
  # GPU device IDs (e.g. ["0", "1"]).  Empty list = all visible GPUs.
  gpu_devices: []
