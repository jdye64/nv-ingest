# Retriever Service Mode — default configuration
#
# Discovery precedence:
#   1. Explicit --config /path/to/retriever-service.yaml
#   2. ./retriever-service.yaml  (current working directory)
#   3. Bundled default shipped with the nemo-retriever package
#
# Every value below can also be overridden from the CLI:
#   retriever service start --port 9000 --log-level DEBUG

server:
  host: "0.0.0.0"
  port: 7670

logging:
  level: "INFO"
  file: "retriever-service.log"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

database:
  # Path to the SQLite database file.  Relative paths are resolved from cwd.
  path: "retriever-service.db"

processing:
  # Number of I/O worker threads (controls request concurrency).
  # Threads overlap on DB writes, SSE publishing, and HTTP uploads
  # even though only one pipeline chain runs at a time.
  thread_pool_size: 32
  # Number of pre-built pipeline operator chains.  Chain execution is
  # serialised (one at a time) because the C/C++ CPU actors (pypdfium2,
  # image cropping) are not thread-safe.  Multiple replicas keep separate
  # operator state but don't improve throughput.  Default: 1.
  pipeline_replicas: 1

# Remote NIM microservice endpoints.  When set, the pipeline calls these
# HTTP endpoints instead of loading GPU models locally.  All four must
# be provided for a fully remote configuration.
nim_endpoints:
  page_elements_invoke_url: http://localhost:8000/v1/infer
  graphic_elements_invoke_url: http://localhost:8003/v1/infer
  table_structure_invoke_url: http://localhost:8000/v1/infer
  ocr_invoke_url: http://localhost:8009/v1/infer
  embed_invoke_url: http://localhost:8012/v1/embeddings
  # NVIDIA API key (or NIM auth token).  Also reads $NVIDIA_API_KEY env var.
  api_key: null

resources:
  # Hard memory cap in MiB.  null = no limit.
  max_memory_mb: null
  # CPU core affinity.  null = all cores.
  max_cpu_cores: null
  # GPU device IDs (e.g. ["0", "1"]).  Empty list = all visible GPUs.
  gpu_devices: []
