            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    runtime: nvidia

  # ===================================================================
  # Embedding — GPU 0
  # ===================================================================
  embedding-gpu0:
    image: ${EMBEDDING_IMAGE:-nvcr.io/nim/nvidia/llama-nemotron-embed-1b-v2}:${EMBEDDING_TAG:-1.13.0}
    shm_size: 16gb
    ports:
      - "8012:8000"
      - "8013:8001"
      - "8014:8002"
    expose:
      - "8000"
      - "8001"
      - "8002"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
      - OMP_NUM_THREADS=1
      - NIM_TRITON_PERFORMANCE_MODE=throughput
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    runtime: nvidia

  # Embedding — GPU 1
  embedding-gpu1:
    image: ${EMBEDDING_IMAGE:-nvcr.io/nim/nvidia/llama-nemotron-embed-1b-v2}:${EMBEDDING_TAG:-1.13.0}
    shm_size: 16gb
    ports:
      - "8112:8000"
      - "8113:8001"
      - "8114:8002"
    expose:
      - "8000"
      - "8001"
      - "8002"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
      - OMP_NUM_THREADS=1
      - NIM_TRITON_PERFORMANCE_MODE=throughput
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    runtime: nvidia

  # ===================================================================
  # Reranker — GPU 0
  # ===================================================================
  reranker-gpu0:
    image: ${RERANKER_IMAGE:-nvcr.io/nim/nvidia/llama-nemotron-rerank-1b-v2}:${RERANKER_TAG:-1.10.0}
    shm_size: 16gb
    ports:
      - "8015:8000"
      - "8016:8001"
      - "8017:8002"
    expose:
      - "8000"
      - "8001"
      - "8002"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    runtime: nvidia
    profiles:
      - reranker

  # Reranker — GPU 1
  reranker-gpu1:
    image: ${RERANKER_IMAGE:-nvcr.io/nim/nvidia/llama-nemotron-rerank-1b-v2}:${RERANKER_TAG:-1.10.0}
    shm_size: 16gb
    ports:
      - "8115:8000"
      - "8116:8001"
      - "8117:8002"
    expose:
      - "8000"
      - "8001"
      - "8002"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    runtime: nvidia
    profiles:
      - reranker

  # ===================================================================
  # Nemotron Parse — GPU 0
  # ===================================================================
  nemotron-parse-gpu0:
    image: ${NEMOTRON_PARSE_IMAGE:-nvcr.io/nim/nvidia/nemotron-parse-v1.2}:${NEMOTRON_PARSE_TAG:-1.7.0-variant}
    shm_size: 16gb
    ports:
      - "8018:8000"
      - "8019:8001"
      - "8020:8002"
    expose:
      - "8000"
      - "8001"
      - "8002"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    runtime: nvidia
    profiles:
      - nemotron-parse

  # Nemotron Parse — GPU 1
  nemotron-parse-gpu1:
    image: ${NEMOTRON_PARSE_IMAGE:-nvcr.io/nim/nvidia/nemotron-parse-v1.2}:${NEMOTRON_PARSE_TAG:-1.7.0-variant}
    shm_size: 16gb
    ports:
      - "8118:8000"
      - "8119:8001"
      - "8120:8002"
    expose:
      - "8000"
      - "8001"
      - "8002"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    runtime: nvidia
    profiles:
