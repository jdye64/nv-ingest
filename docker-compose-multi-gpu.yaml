  # ===================================================================
  # VLM — GPU 0
  # ===================================================================
  vlm-gpu0:
    image: ${VLM_IMAGE:-nvcr.io/nim/nvidia/nemotron-nano-12b-v2-vl}:${VLM_TAG:-1.5.0}
    shm_size: 16gb
    ports:
      - "8021:8000"
    expose:
      - "8000"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    runtime: nvidia
    profiles:
      - vlm

  # VLM — GPU 1
  vlm-gpu1:
    image: ${VLM_IMAGE:-nvcr.io/nim/nvidia/nemotron-nano-12b-v2-vl}:${VLM_TAG:-1.5.0}
    shm_size: 16gb
    ports:
      - "8121:8000"
    expose:
      - "8000"
    environment:
      - NIM_HTTP_API_PORT=8000
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    runtime: nvidia
    profiles:
      - vlm

  # ===================================================================
  # Audio (ASR) — GPU 0
  # ===================================================================
  audio-gpu0:
    image: ${AUDIO_IMAGE:-nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us}:${AUDIO_TAG:-1.5.0}
    shm_size: 2gb
    ports:
      - "8022:50051"
      - "8023:9000"
    expose:
      - "50051"
      - "9000"
    ulimits:
      nofile: 2048
    environment:
      - NIM_TAGS_SELECTOR=name=parakeet-1-1b-ctc-en-us,mode=ofl
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    runtime: nvidia
    profiles:
      - audio

  # Audio (ASR) — GPU 1
  audio-gpu1:
    image: ${AUDIO_IMAGE:-nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us}:${AUDIO_TAG:-1.5.0}
    shm_size: 2gb
    ports:
      - "8122:50051"
      - "8123:9000"
    expose:
      - "50051"
      - "9000"
    ulimits:
      nofile: 2048
    environment:
      - NIM_TAGS_SELECTOR=name=parakeet-1-1b-ctc-en-us,mode=ofl
      - NIM_TRITON_LOG_VERBOSE=1
      - NGC_API_KEY=${NIM_NGC_API_KEY:-${NGC_API_KEY:-ngcapikey}}
